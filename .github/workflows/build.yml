name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  准备:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: 设置 gradlew 权限
        run: chmod +x gradlew

  编译:
    needs: 准备
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: 设置 gradlew 权限
        run: chmod +x gradlew
      - name: Gradle Build
        run: ./gradlew build
      - name: 上传 JAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: 32kLimiter
          path: build/libs/*.jar

  上传:
    needs: 编译
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: 32kLimiter
      - name: 发布产物
        uses: actions/upload-artifact@v4
        with:
          name: 32kLimiter
          path: *.jar
